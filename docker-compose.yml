services:
  mariadb:
    image: mariadb:10.11
    container_name: stelvis-mariadb
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
    environment:
      MYSQL_ROOT_PASSWORD: stelvis2024
    volumes:
      - mariadb-data:/var/lib/mysql
    networks:
      - stelvis-network
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-pstelvis2024"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis-cache:
    image: redis:7-alpine
    container_name: stelvis-redis-cache
    restart: unless-stopped
    networks:
      - stelvis-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-queue:
    image: redis:7-alpine
    container_name: stelvis-redis-queue
    restart: unless-stopped
    networks:
      - stelvis-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  configurator:
    image: frappe/erpnext:v15
    container_name: stelvis-configurator
    restart: "no"
    entrypoint: ["bash", "-c"]
    command:
      - |
        set -e
        echo ">>> Waiting for services..."
        sleep 10
        echo ">>> Writing site config..."
        printf '{\n  "db_host": "mariadb",\n  "db_port": 3306,\n  "redis_cache": "redis://redis-cache:6379",\n  "redis_queue": "redis://redis-queue:6379",\n  "redis_socketio": "redis://redis-queue:6379",\n  "socketio_port": 9000\n}\n' > /home/frappe/frappe-bench/sites/common_site_config.json
        SITE_DIR="/home/frappe/frappe-bench/sites/stelvis.local/site_config.json"
        if [ -f "$$SITE_DIR" ]; then
          echo ">>> Site already exists. Skipping creation."
        else
          echo ">>> Creating site stelvis.local..."
          echo ">>> This takes 5-10 minutes on first run. Please wait..."
          bench new-site stelvis.local --mariadb-root-password stelvis2024 --admin-password admin2024 --install-app erpnext --set-default
          bench --site stelvis.local set-config developer_mode 0
          bench --site stelvis.local set-config server_script_enabled 1
          bench --site stelvis.local scheduler enable
          echo ">>> Fixing database access..."
          DB_USER=$$(python3 -c "import json; print(json.load(open('$$SITE_DIR'))['db_name'])")
          if [ -n "$$DB_USER" ]; then
            CURRENT_HOST=$$(mysql -h mariadb -uroot -pstelvis2024 -N -e "SELECT Host FROM mysql.global_priv WHERE User='$$DB_USER' LIMIT 1;" 2>/dev/null)
            if [ -n "$$CURRENT_HOST" ] && [ "$$CURRENT_HOST" != "%" ]; then
              mysql -h mariadb -uroot -pstelvis2024 -e "RENAME USER '$$DB_USER'@'$$CURRENT_HOST' TO '$$DB_USER'@'%'; FLUSH PRIVILEGES;" 2>/dev/null || true
            fi
            echo ">>> Database access fixed."
          fi
          echo ">>> Site created successfully!"
        fi
        echo ">>> Done! ERPNext is ready."
    volumes:
      - sites-data:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    depends_on:
      mariadb:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      redis-queue:
        condition: service_healthy
    networks:
      - stelvis-network

  erpnext:
    image: frappe/erpnext:v15
    container_name: stelvis-erpnext
    restart: unless-stopped
    volumes:
      - sites-data:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    depends_on:
      configurator:
        condition: service_completed_successfully
    networks:
      - stelvis-network

  erpnext-worker-short:
    image: frappe/erpnext:v15
    container_name: stelvis-worker-short
    restart: unless-stopped
    command: bench worker --queue short
    volumes:
      - sites-data:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    depends_on:
      configurator:
        condition: service_completed_successfully
    networks:
      - stelvis-network

  erpnext-worker-long:
    image: frappe/erpnext:v15
    container_name: stelvis-worker-long
    restart: unless-stopped
    command: bench worker --queue long
    volumes:
      - sites-data:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    depends_on:
      configurator:
        condition: service_completed_successfully
    networks:
      - stelvis-network

  erpnext-worker-default:
    image: frappe/erpnext:v15
    container_name: stelvis-worker-default
    restart: unless-stopped
    command: bench worker --queue default
    volumes:
      - sites-data:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    depends_on:
      configurator:
        condition: service_completed_successfully
    networks:
      - stelvis-network

  erpnext-scheduler:
    image: frappe/erpnext:v15
    container_name: stelvis-scheduler
    restart: unless-stopped
    command: bench schedule
    volumes:
      - sites-data:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    depends_on:
      configurator:
        condition: service_completed_successfully
    networks:
      - stelvis-network

  nginx:
    image: frappe/erpnext:v15
    container_name: stelvis-nginx
    restart: unless-stopped
    command: nginx-entrypoint.sh
    environment:
      BACKEND: erpnext:8000
      SOCKETIO: erpnext:9000
      FRAPPE_SITE_NAME_HEADER: stelvis.local
    volumes:
      - sites-data:/home/frappe/frappe-bench/sites
    ports:
      - "80:8080"
      - "8080:8080"
    depends_on:
      configurator:
        condition: service_completed_successfully
    networks:
      - stelvis-network

volumes:
  mariadb-data:
  sites-data:
  logs:

networks:
  stelvis-network:
    name: stelvis-network
